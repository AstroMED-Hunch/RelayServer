        <!-- Dialogs -->
        <div id="boxEnterConfirmationDiag" class="dialog">
            <div id="boxEnterConfirmationDiagContent" class="dialogContent">
                <p id="boxEnterConfirmationDiagText">An unregistered box has entered the camera, would you like to register?</p>
                <img id="boxEnterConfirmationDiagImg" src="" alt="Box Image" width="400", height="300">
                <button id="boxEnterConfirmationDiagBtnYes">Yes</button>
                <button id="boxEnterConfirmationDiagBtnNo">No</button>
            </div>
        </div>

        <div id="multiBoxWarningDiag" class="dialog">
            <div id="multiBoxWarningDiagContent" class="dialogContent">
                <p id="multiBoxWarningDiagText">Multiple boxes detected! Please ensure only one new box is in the camera view.</p>
            </div>
        </div>
